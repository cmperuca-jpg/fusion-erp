<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fusion ERP - Login</title>
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="/assets/css/fusion-app.css">

<link rel="manifest" href="/manifest-sistema.webmanifest">
<meta name="theme-color" content="#ff6600">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/pwa/icons/fusion-icon-180.png">
<link rel="stylesheet" href="/assets/pwa/fusion-pwa-mobile.css">
</head>
<body>

  <div class="card">
    <h1>Fusion ERP</h1>
    <p>Entrar no sistema</p>

    <form>
      <input type="email" placeholder="E-mail">
      <input type="password" placeholder="Senha">
      <button type="submit">Entrar</button>
    </form>

    <div class="rodape">Versão 1.0</div>
  </div>

  <script src="/js/login.js"></script>
  
<script src="/assets/pwa/fusion-pwa-install.js" defer></script>
</body>
</html>
