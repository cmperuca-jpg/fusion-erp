<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fusion ERP - Contrato Comercial</title><link rel="stylesheet" href="/assets/css/fusion-app.css"><script src="/assets/js/fusion-auth.js"></script><script>FusionAuth.proteger();</script><style>.wrap{max-width:1100px;margin:24px auto;padding:0 16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.field{display:grid;gap:6px;margin:8px 0}.field input,.field select{padding:10px;border:1px solid #cbd5e1;border-radius:8px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #e2e8f0;padding:10px;text-align:left}.total{font-size:24px;font-weight:800}.msg{margin:12px 0;padding:10px;border-radius:8px}.ok{background:#dcfce7;color:#166534}.erro{background:#fee2e2;color:#991b1b}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style>
<link rel="manifest" href="/manifest-sistema.webmanifest">
<meta name="theme-color" content="#ff6600">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/pwa/icons/fusion-icon-180.png">
<link rel="stylesheet" href="/assets/pwa/fusion-pwa-mobile.css">
  <link rel="stylesheet" href="/assets/css/fusion-mobile-final.css">
  <link rel="stylesheet" href="/assets/css/fusion-no-sidebar.css">
  <link rel="stylesheet" href="/assets/css/fusion-premium-final.css">
</head><body><main class="wrap"><h2>Contrato Comercial</h2><div id="msg"></div><div class="card"><label class="field">Contrato<select id="contratoId"></select></label><button id="btnCarregar">Carregar</button></div><div class="grid"><section class="card"><h3>Resumo</h3><p><b>Aluno:</b> <span id="aluno">-</span></p><p><b>Status:</b> <span id="status">-</span></p><label class="field">Valor da matrícula/base<input id="valorMatricula" inputmode="decimal"></label><button id="btnSalvarMatricula">Salvar valor da matrícula</button><p>Total atual</p><div class="total" id="total">R$ 0,00</div></section><section class="card"><h3>Adicionar serviço/turma</h3><label class="field">Serviço<select id="servicoId"><option value="">Selecione</option></select></label><label class="field">Turma<select id="turmaId"><option value="">Opcional</option></select></label><label class="field">Valor<input id="valorServico" inputmode="decimal" placeholder="usar valor padrão"></label><button id="btnAdicionar">Adicionar</button></section></div><section class="card" style="margin-top:16px"><h3>Serviços contratados</h3><table class="table"><thead><tr><th>Serviço</th><th>Turma</th><th>Professor/Horário</th><th>Valor</th><th>Ações</th></tr></thead><tbody id="servicos"><tr><td colspan="5">Carregue um contrato.</td></tr></tbody></table></section></main><script src="/js/comercial/contrato.js"></script>
<script src="/assets/pwa/fusion-pwa-install.js" defer></script>
  <script src="/assets/js/fusion-mobile-final.js" defer></script>
  <script src="/assets/js/fusion-layout.js" defer></script>
  <script src="/assets/js/fusion-no-sidebar.js" defer></script>
</body></html>
