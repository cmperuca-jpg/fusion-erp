<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion ERP - Matrículas</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/assets/css/fusion-app.css">
  <script src="/assets/js/fusion-auth.js"></script>
  <script>FusionAuth.proteger();</script>
  <meta name="fusion-existing-pages" content="access-engine,admin,agenda,aluno-avaliacao,aluno-login,aluno-treinos,alunos,avaliacoes,bi-academia,bi-academia-operacional,bi-financeiro,caixa,checkin,comercial,comercial-painel,configuracoes,dashboard,financeiro,matricula-online,matriculas,matriculas-pendentes,mensalidades,modalidades,natacao-professor,planos,professor-area,professor-login,professores,recebimentos,relatorios-caixa,treinos,turmas">

<link rel="manifest" href="/manifest-sistema.webmanifest">
<meta name="theme-color" content="#ff6600">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/pwa/icons/fusion-icon-180.png">
<link rel="stylesheet" href="/assets/pwa/fusion-pwa-mobile.css">
  <link rel="stylesheet" href="/assets/css/fusion-mobile-final.css">
  <link rel="stylesheet" href="/assets/css/fusion-premium-final.css">
</head>
<body>

<main class="main">

<section class="card">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <div>
      <h2>Matrículas</h2>
      <p>Controle matriculas vinculadas ao plano. Turmas ficam separadas do financeiro.</p>
    </div>

    <button type="button" onclick="window.location.href='/pages/matriculas/cadastro.html'">Nova Matrícula</button>
  </div>

  <div class="filtros">
    <input id="filtroAluno" placeholder="Pesquisar aluno">
    <input id="filtroTurma" placeholder="Pesquisar turma">

    <select id="filtroStatus">
      <option value="">Todos status</option>
      <option value="ativa">Ativa</option>
      <option value="trancada">Trancada</option>
      <option value="encerrada">Encerrada</option>
      <option value="cancelada">Cancelada</option>
    </select>

    <button onclick="aplicarFiltros()">Pesquisar</button>
    <button onclick="limparFiltros()">Limpar</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Aluno</th>
        <th>Turma</th>
        <th>Plano</th>
        <th>Valor</th>
        <th>Início</th>
        <th>Fim</th>
        <th>Status</th>
        <th width="240">Ações</th>
      </tr>
    </thead>
    <tbody id="tabelaMatriculas"></tbody>
  </table>

</section>

</main>
<script src="/js/modal.js"></script>
<script src="/js/matriculas/index.js"></script>

    <script src="/assets/js/fusion-layout.js"></script>

<script src="/assets/pwa/fusion-pwa-install.js" defer></script>
  <script src="/assets/js/fusion-mobile-final.js" defer></script>
</body>
</html>
