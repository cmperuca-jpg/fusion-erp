<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Fusion ERP - Ficha da Matrícula</title><link rel="stylesheet" href="/css/dashboard.css"><link rel="stylesheet" href="/assets/css/fusion-app.css"><script src="/assets/js/fusion-auth.js"></script><script>FusionAuth.proteger();</script>
