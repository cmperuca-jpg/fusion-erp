<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Login do Professor - Fusion ERP</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="/manifest-sistema.webmanifest">
  <meta name="theme-color" content="#ff6600">
  <link rel="stylesheet" href="/assets/css/fusion-no-sidebar.css">
</head>
<body>
  <main class="prof-login-wrap">
    <section class="prof-login-card">
      <div class="brand">Fusion ERP</div>
      <h1>Acesso do professor</h1>
      <p>Área restrita para avaliação física e montagem de treinos. Sem acesso ao painel administrativo do sistema.</p>

      <label>Login
        <input id="login" autocomplete="username" placeholder="CPF, e-mail, CREF, telefone ou nome">
      </label>
      <label>Senha
        <input id="senha" type="password" autocomplete="current-password" placeholder="Senha do professor">
      </label>

      <button id="entrar" class="btn primary" type="button">Entrar</button>
      <div id="mensagem" class="msg"></div>
      <small class="hint">Senha aceita: senha cadastrada no professor. Se não existir, use CPF completo, 4 últimos dígitos do CPF ou CREF.</small>
    </section>
  </main>
  <script src="./index.js"></script>
  <script src="/assets/js/fusion-no-sidebar.js" defer></script>
</body>
</html>
