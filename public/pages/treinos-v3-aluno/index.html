<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fusion ERP - Treino do Aluno V3</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="aluno-treino-app">
    <header class="hero-card">
      <div>
        <small>TREINO DE HOJE</small>
        <h1 id="tituloTreino">Treino A</h1>
        <p id="descricaoTreino">Carregando biblioteca de exercícios...</p>
      </div>
      <div class="hero-actions">
        <div class="workout-clock" id="relogioTreino" aria-live="polite">
          <span>Estimado</span><strong id="tempoEstimadoTreino">--:--</strong>
          <span>Decorrido</span><strong id="tempoDecorridoTreino">00:00</strong>
        </div>
        <button id="btnAudioTreino" class="audio-toggle" type="button" aria-pressed="true" title="Ativar ou desativar voz do treino">🔊 Voz</button>
        <button id="btnComandoVoz" class="voice-command-toggle" type="button" aria-pressed="false" title="Ativar comandos por voz">🎙️ Comando</button>
        <button id="btnIniciarTreino" type="button">Iniciar treino</button>
      </div>
    </header>

    <nav class="tabs" id="tabsTreino"></nav>

    <section class="prescricao-card">
      <div class="section-head">
        <div>
          <small>PRESCRIÇÃO</small>
          <h2 id="nomeGrupo">Treino A</h2>
        </div>
        <div class="prescription-actions">
          <div class="timer-box">
            <span>Descanso</span>
            <strong id="cronometroDescanso">00:00</strong>
          </div>
          <button id="btnInicioLivre" class="free-start" type="button">Início</button>
          <button id="btnTerminarLivre" class="free-finish" type="button" disabled>Treino terminado</button>
        </div>
      </div>
      <div id="listaExercicios" class="exercise-list"></div>
    </section>
  </main>

  <div class="modal hidden" id="modalExercicio">
    <div class="modal-card">
      <div class="modal-guided-top">
        <div class="modal-clock"><span>Treino</span><strong id="modalTempoDecorrido">00:00</strong></div>
        <label class="modal-volume"><span>Volume</span><input id="volumeTreino" type="range" min="0" max="100" value="100"></label>
        <div class="modal-voice-status" id="statusComandoVoz">Voz manual</div>
      </div>
      <div class="media-box" id="modalMedia"></div>
      <div class="modal-info">
        <small id="modalGrupo">GRUPO</small>
        <h2 id="modalNome">Exercício</h2>

        <div class="exercise-stats">
          <div><span>Séries</span><strong id="modalSeries">-</strong></div>
          <div><span>Repetições</span><strong id="modalReps">-</strong></div>
          <div><span>Carga</span><strong id="modalCarga">-</strong></div>
          <div><span>Descanso</span><strong id="modalDescanso">-</strong></div>
        </div>

        <div class="cardio-control hidden" id="cardioControl">
          <label>Tempo do cardio (min)
            <input id="cardioTempoAluno" type="number" min="1" step="1" value="20">
          </label>
          <button id="btnIniciarCardio" type="button">▶ Iniciar cardio</button>
          <strong id="cardioCronometro">00:00</strong>
        </div>

        <p id="modalObs" class="modal-obs"></p>

        <div class="modal-progress">
          <span id="modalContador">Exercício 1 de 1</span>
          <div class="progress"><i id="barraProgresso"></i></div>
        </div>

        <div class="modal-actions">
          <button id="btnAnterior" type="button" class="secondary">← Anterior</button>
          <button id="btnDescanso" type="button" class="secondary">⏱ Iniciar descanso</button>
          <button id="btnProximo" type="button">Próximo exercício</button>
        </div>
      </div>
    </div>
  </div>

  <div class="offline-badge hidden" id="offlineBadge">Modo offline: usando último treino salvo</div>
  <div class="toast hidden" id="toast"></div>

  <script src="./index.js"></script>
</body>
</html>
