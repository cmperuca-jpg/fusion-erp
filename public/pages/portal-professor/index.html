<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal do Professor - Fusion ERP</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="/assets/css/fusion-app.css">
  <script src="/assets/js/fusion-auth.js"></script>
  <script>FusionAuth.proteger();</script>
</head>
<body>
  <main class="portal-shell">
    <section class="portal-login">
      <div class="login-wrap">
        <div class="brand">Fusion ERP</div>
        <div class="card login-card">
          <small class="eyebrow">ACESSO RÁPIDO</small>
          <h1>Portal do Professor</h1>
          <p>Entre com CPF e telefone/WhatsApp cadastrados no módulo Professores.</p>

          <form id="formAcesso" autocomplete="on">
            <label>CPF
              <input id="cpf" autocomplete="username" inputmode="numeric" placeholder="000.000.000-00" required>
            </label>

            <label>Telefone / WhatsApp
              <input id="telefone" autocomplete="tel" inputmode="tel" placeholder="(00) 00000-0000" required>
            </label>

            <label class="remember-line">
              <input id="lembrarDispositivo" type="checkbox" checked>
              <span>Lembrar deste dispositivo</span>
            </label>

            <button type="submit">Acessar painel</button>
          </form>

          <div id="alerta" class="alert hidden"></div>
        </div>
      </div>
    </section>
  </main>
  <script src="./index.js"></script>
  <script src="/assets/js/fusion-layout.js"></script>
</body>
</html>
