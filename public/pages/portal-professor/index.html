<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal do Professor - Fusion ERP</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="portal-shell">
    <section class="portal-login">
      <div class="brand">Fusion ERP</div>
      <div class="card login-card">
        <h1>Portal do Professor</h1>
        <p>Acesse o painel operacional com os dados cadastrados no módulo Professores.</p>
        <form id="formAcesso">
          <label>CPF <input id="cpf" autocomplete="username" placeholder="000.000.000-00" required></label>
          <label>Data de nascimento <input id="dataNascimento" type="date"></label>
          <label>Telefone/WhatsApp, se não tiver nascimento cadastrado <input id="telefone" placeholder="(00) 00000-0000"></label>
          <label>CREF, se preferir usar como chave <input id="cref" placeholder="CREF cadastrado"></label>
          <button type="submit">Acessar painel</button>
        </form>
        <div id="alerta" class="alert hidden"></div>
      </div>
    </section>
  </main>
  <script src="./index.js"></script>
</body>
</html>
