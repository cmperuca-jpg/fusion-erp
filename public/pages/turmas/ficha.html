<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion ERP - Ficha da Turma</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/assets/css/fusion-app.css">
  <script src="/assets/js/fusion-auth.js"></script>
  <script>FusionAuth.proteger();</script>
  <meta name="fusion-existing-pages" content="agenda,alunos,avaliacoes,bi,bi-academia,bi-academia-operacional,bi-financeiro,caixa,checkin,configuracoes,dashboard,estoque,exercicios,financeiro,login,matriculas,mensalidades,modalidades,modelos-treino,pagamentos,planos,presencas,professores,recebimentos,relatorios-caixa,treinos,turmas">

<link rel="manifest" href="/manifest-sistema.webmanifest">
<meta name="theme-color" content="#ff6600">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/pwa/icons/fusion-icon-180.png">
<link rel="stylesheet" href="/assets/pwa/fusion-pwa-mobile.css">
  <link rel="stylesheet" href="/assets/css/fusion-premium-final.css">
</head>
<body>

<main class="main">

<section class="card">

  <div class="cadastro-header">
    <div>
      <h2 id="nomeTurma">Carregando...</h2>
      <p>Ficha completa da turma.</p>
    </div>
  </div>

  <div class="ficha-grid">
    <p><b>Modalidade:</b> <span id="modalidade"></span></p>
    <p><b>Professor:</b> <span id="professor"></span></p>
    <p><b>Dias:</b> <span id="dias_semana"></span></p>
    <p><b>Horário:</b> <span id="horario"></span></p>
    <p><b>Capacidade:</b> <span id="capacidade"></span></p>
    <p><b>Local:</b> <span id="sala_local"></span></p>
    <p><b>Data início:</b> <span id="data_inicio"></span></p>
    <p><b>Data fim:</b> <span id="data_fim"></span></p>
    <p><b>Status:</b> <span id="status"></span></p>
  </div>

  <br>

  <h3>Observações</h3>
  <p id="observacoes"></p>

  <div class="form-actions">
    <button id="btnEditar">Editar</button>
    <button onclick="window.print()">Imprimir</button>
    <button onclick="window.location='/pages/turmas/'">Voltar</button>
  </div>

</section>

</main>
<script src="/js/turmas/ficha.js"></script>

    <script src="/assets/js/fusion-layout.js"></script>

<script src="/assets/pwa/fusion-pwa-install.js" defer></script>
</body>
</html>
