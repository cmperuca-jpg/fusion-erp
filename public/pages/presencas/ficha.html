<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion ERP - Ficha da Presença</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/assets/css/fusion-app.css">
  <script src="/assets/js/fusion-auth.js"></script>
  <script>FusionAuth.proteger();</script>
  <meta name="fusion-existing-pages" content="agenda,alunos,avaliacoes,bi,bi-academia,bi-academia-operacional,bi-financeiro,caixa,checkin,configuracoes,dashboard,estoque,exercicios,financeiro,login,matriculas,mensalidades,modalidades,modelos-treino,pagamentos,planos,presencas,professores,recebimentos,relatorios-caixa,treinos,turmas">

<link rel="manifest" href="/manifest-sistema.webmanifest">
<meta name="theme-color" content="#ff6600">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/pwa/icons/fusion-icon-180.png">
<link rel="stylesheet" href="/assets/pwa/fusion-pwa-mobile.css">
  <link rel="stylesheet" href="/assets/css/fusion-mobile-final.css">
  <link rel="stylesheet" href="/assets/css/fusion-no-sidebar.css">
</head>
<body>

<main class="main">

<section class="card">

  <div class="cadastro-header">
    <div>
      <h2 id="tituloPresenca">Carregando...</h2>
      <p>Registro completo da presença.</p>
    </div>
  </div>

  <div class="ficha-grid">
    <p><b>Aluno:</b> <span id="aluno"></span></p>
    <p><b>Turma:</b> <span id="turma"></span></p>
    <p><b>Professor:</b> <span id="professor"></span></p>
    <p><b>Data:</b> <span id="data"></span></p>
    <p><b>Entrada:</b> <span id="hora_entrada"></span></p>
    <p><b>Saída:</b> <span id="hora_saida"></span></p>
    <p><b>Tipo:</b> <span id="tipo"></span></p>
    <p><b>Status:</b> <span id="status"></span></p>
    <p><b>Responsável:</b> <span id="responsavel"></span></p>
  </div>

  <br>

  <h3>Observações</h3>
  <p id="observacoes"></p>

  <div class="form-actions">
    <button id="btnEditar">Editar</button>
    <button onclick="window.print()">Imprimir</button>
    <button onclick="window.location='/pages/presencas/'">Voltar</button>
  </div>

</section>

</main>
<script src="/js/presencas/ficha.js"></script>

    <script src="/assets/js/fusion-layout.js"></script>

<script src="/assets/pwa/fusion-pwa-install.js" defer></script>
  <script src="/assets/js/fusion-mobile-final.js" defer></script>
  <script src="/assets/js/fusion-no-sidebar.js" defer></script>
</body>
</html>
