services:
  - type: web
    name: fusion-erp
    env: node
    plan: free
    buildCommand: npm ci --omit=dev || npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: fusion-erp-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: FUSION_PERSISTENT_DIR
        value: /var/data/fusion
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ACCESS_AGENT_ID
        value: academia-01
      - key: ACCESS_AGENT_TOKEN
        sync: false
      - key: ACCESS_COMMAND_API_KEY
        sync: false
